<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proposal Project </title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- FESTIVE LIGHTS (Old Style, No Border) -->
  <!-- This container should span full viewport height (100vh) via CSS -->
  <div class="festive-lights">
    <!-- Top Lights -->
    <div class="light" style="top: 0; left: 5%; background: #FF0000; animation-delay: 0s;"></div>
    <div class="light" style="top: 0; left: 10%; background: #0c21c1; animation-delay: 2.2s;"></div>
    <div class="light" style="top: 0; left: 15%; background: #00FF00; animation-delay: 0.2s;"></div>
    <div class="light" style="top: 0; left: 20%; background: #01e5bb; animation-delay: 0.4s;"></div>
    <div class="light" style="top: 0; left: 25%; background: #0000FF; animation-delay: 0.4s;"></div>
    <div class="light" style="top: 0; left: 30%; background: #040807; animation-delay: 0.8s;"></div>
    <div class="light" style="top: 0; left: 35%; background: #FFA500; animation-delay: 0.6s;"></div>
    <div class="light" style="top: 0; left: 40%; background: #e90a51; animation-delay: 1.2s;"></div>
    <div class="light" style="top: 0; left: 45%; background: #FF00FF; animation-delay: 0.8s;"></div>
    <div class="light" style="top: 0; left: 50%; background: #e3e30a; animation-delay: 1.6s;"></div>
    <div class="light" style="top: 0; left: 55%; background: #00FFFF; animation-delay: 1s;"></div>
    <div class="light" style="top: 0; left: 60%; background: #053f95; animation-delay: 2.4s;"></div>
    <div class="light" style="top: 0; left: 65%; background: #ADFF2F; animation-delay: 1.2s;"></div>
    <div class="light" style="top: 0; left: 70%; background: #7005bd; animation-delay: 2.8s;"></div>
    <div class="light" style="top: 0; left: 75%; background: #FFD700; animation-delay: 1.4s;"></div>
    <div class="light" style="top: 0; left: 80%; background: #068b13; animation-delay: 3.2s;"></div>
    <div class="light" style="top: 0; left: 85%; background: #FF4500; animation-delay: 1.6s;"></div>
    <div class="light" style="top: 0; left: 90%; background: #05a7b2; animation-delay: 3.6s;"></div>
    <div class="light" style="top: 0; left: 95%; background: #8A2BE2; animation-delay: 1.8s;"></div>
    
    <!-- Bottom Lights -->
    <div class="light" style="bottom: 0; left: 5%; background: #FF0000; animation-delay: 2s;"></div>
    <div class="light" style="bottom: 0; left: 10%; background: #0c21c1; animation-delay: 2.2s;"></div>
    <div class="light" style="bottom: 0; left: 15%; background: #FF0000; animation-delay: 0.2s;"></div>
    <div class="light" style="bottom: 0; left: 20%; background: #01e5bb; animation-delay: 0.4s;"></div>
    <div class="light" style="bottom: 0; left: 25%; background: #bbf805; animation-delay: 0.6s;"></div>
    <div class="light" style="bottom: 0; left: 30%; background: #040807; animation-delay: 0.8s;"></div>
    <div class="light" style="bottom: 0; left: 35%; background: #f505a1; animation-delay: 1s;"></div>
    <div class="light" style="bottom: 0; left: 40%; background: #e90a51; animation-delay: 1.2s;"></div>
    <div class="light" style="bottom: 0; left: 45%; background: #07ce71; animation-delay: 1.4s;"></div>
    <div class="light" style="bottom: 0; left: 50%; background: #e3e30a; animation-delay: 1.6s;"></div>
    <div class="light" style="bottom: 0; left: 55%; background: #039c76; animation-delay: 1.8s;"></div>
    <div class="light" style="bottom: 0; left: 60%; background: #053f95; animation-delay: 2.4s;"></div>
    <div class="light" style="bottom: 0; left: 65%; background: #2d9603; animation-delay: 2.6s;"></div>
    <div class="light" style="bottom: 0; left: 70%; background: #7005bd; animation-delay: 2.8s;"></div>
    <div class="light" style="bottom: 0; left: 75%; background: #FF0000; animation-delay: 3s;"></div>
    <div class="light" style="bottom: 0; left: 80%; background: #068b13; animation-delay: 3.2s;"></div>
    <div class="light" style="bottom: 0; left: 85%; background: #5b07ae; animation-delay: 3.4s;"></div>
    <div class="light" style="bottom: 0; left: 90%; background: #05a7b2; animation-delay: 3.6s;"></div>
    <div class="light" style="bottom: 0; left: 95%; background: #d88005; animation-delay: 3.8s;"></div>
    <div class="light" style="bottom: 0; left: 99%; background: #FF0000; animation-delay: 4s;"></div>
    
    <!-- Left Vertical Lights -->
    <div class="light" style="left: 0; top: 10%; background: #00FF00; animation-delay: 0s;"></div>
    <div class="light" style="left: 0; top: 30%; background: #0000FF; animation-delay: 0.3s;"></div>
    <div class="light" style="left: 0; top: 50%; background: #FFA500; animation-delay: 0.6s;"></div>
    <div class="light" style="left: 0; top: 70%; background: #FF00FF; animation-delay: 0.9s;"></div>
    <div class="light" style="left: 0; top: 90%; background: #00FFFF; animation-delay: 1.2s;"></div>
    
    <!-- Right Vertical Lights -->
    <div class="light" style="right: 0; top: 10%; background: #FF00FF; animation-delay: 0s;"></div>
    <div class="light" style="right: 0; top: 30%; background: #00FFFF; animation-delay: 0.3s;"></div>
    <div class="light" style="right: 0; top: 50%; background: #FFA500; animation-delay: 0.6s;"></div>
    <div class="light" style="right: 0; top: 70%; background: #0000FF; animation-delay: 0.9s;"></div>
    <div class="light" style="right: 0; top: 90%; background: #00FF00; animation-delay: 1.2s;"></div>
  </div>

  <!-- BACKGROUND DECOR: STARS (OPTIONAL) -->
  <div class="background-decor">
    <div class="stars"></div>
  </div>

  <!-- MAIN INTERACTIVE CONTENT -->
  <div id="container">
    <!-- SECTION 1: OPENING SCENE -->
    <section id="opening-scene" class="scene active">
      <div class="background">
        <!-- Three houses -->
        <div id="house-left" class="house"></div>
        <div id="house-middle" class="house"></div>
        <div id="house-right" class="house"></div>
      </div>
      <div id="instruction">Click any house</div>
    </section>

    <!-- SECTION 2: CHIBI GREETING -->
    <section id="chibi-greeting" class="scene">
      <img id="chibi" src="images/chibi.png" alt="Chibi Character"/>
      <div id="greeting-text">
        Do you know what to do, or need any help?
      </div>
      <div class="response-buttons">
        <button id="got-this">I got this!</button>
        <button id="help-me">Help me!</button>
      </div>
      <div id="greeting-response"></div>
    </section>

    <!-- SECTION 3: PLAYFUL BUTTON -->
    <section id="playful-button" class="scene">
      <button id="teasing-button">CLICK ME START!!</button>
      <div id="button-response"></div>
    </section>

    <!-- SECTION 4: GUESS THE SURPRISE! -->
    <section id="guess-surprise" class="scene">
      <div id="surprise-options">
        <button class="surprise-btn" data-type="cute">
          🎀 A Cute Message
        </button>
        <button class="surprise-btn" data-type="funny">
          😂 A Funny Surprise
        </button>
        <button class="surprise-btn" data-type="danger">
          ⚠️ Danger! System Hack
        </button>
      </div>
      <div id="surprise-feedback"></div>
    </section>

    <!-- SECTION 5: QUIZ -->
    <section id="quiz-section" class="scene">
      <div id="quiz-container">
        <!-- Quiz questions will be inserted here by JS -->
      </div>
      <!-- Centered Quiz Chibi with Thinking Bubble -->
      <div id="chibi-thinking">
        <img id="quiz-chibi" src="images/chibi.png" alt="Chibi Thinking" />
        <div id="thinking-bubble"></div>
      </div>
    </section>

    <!-- SECTION 6: FINAL MESSAGE & CAKE -->
    <section id="final-message" class="scene">
      <!-- Code-style Box for Final Birthday Message -->
      <div class="code-box">
        <div id="final-text"></div>
      </div>
      <div id="final-options">
        <button id="yes-btn">Yes</button>
        <button id="decline-btn">Decline</button>
      </div>

      <!-- Cake container: We'll swap from lit cake to unlit cake in JS -->
      <div id="cake-container">
        <img id="birthday-cake" src="images/cake.png" alt="Birthday Cake"/>
        <div id="candles"></div>
      </div>

      <div id="final-feedback"></div>

      <!-- Final Chibi with Speech Bubble -->
      <div id="final-chibi-container">
        <img id="final-chibi" src="images/chibi.png" alt="Final Chibi" />
        <div id="final-chibi-bubble">Wanna be my Girlfriend!</div>
      </div>
    </section>
  </div>

  <!-- AUDIO ELEMENTS -->
  <audio id="decline-sound" src="sounds/decline.mp3"></audio>
  <audio id="tease-sound" src="sounds/tease.mp3"></audio>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>
</body>
</html>
